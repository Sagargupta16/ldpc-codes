name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install .
      - name: Compile check
        run: python -m compileall ldpc binary plot_coding_decoding_simulation.py plot_image_transmission.py plot_parallel_decoding.py
      - name: Import smoke test
        run: python -c "import ldpc; from ldpc import make_ldpc, encode, decode, get_message; print(ldpc.__version__)"
